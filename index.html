<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Download File</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .box {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
    }
    h2 { color: #00ff88; }
    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 25px;
      background: #00ff88;
      color: black;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      transition: 0.3s;
      cursor: pointer;
      border: none;
    }
    .btn.disabled {
      background: #444;
      color: #888;
      pointer-events: none;
    }
    .timer { margin-top: 10px; color: #ccc; font-size: 14px; }
    .ads { margin: 15px 0; width: 100%; max-width: 320px; text-align: center; }
  </style>
</head>
<body>

  <!-- BANNER AD TOP -->
  <div class="ads">
    <!-- Paste Adsterra banner code here -->
  </div>

  <div class="box">
    <h2>Download Ready</h2>
    <p>Wait 15 seconds to get your link</p>
    
    <div class="timer" id="timer">Please wait: 15s</div>
    
    <button id="downloadBtn" class="btn disabled">Download Now</button>
  </div>

  <!-- BANNER AD BOTTOM -->
  <div class="ads">
    <!-- Paste Adsterra banner code here -->
  </div>

  <script>
    let timeLeft = 15;
    const timerEl = document.getElementById("timer");
    const btnEl = document.getElementById("downloadBtn");
    const downloadLink = "📁 TurboClean_xo.ipa";

    const countdown = setInterval(() => {
      timeLeft--;
      timerEl.textContent = "Please wait: " + timeLeft + "s";
      
      if (timeLeft <= 0) {
        clearInterval(countdown);
        timerEl.textContent = "You can download now!";
        btnEl.classList.remove("disabled");
      }
    }, 1000);

    // Only trigger download + popunder when button is clicked
    btnEl.addEventListener("click", function() {
      if (timeLeft <= 0) {
        window.location.href = downloadLink;
      }
    });
  </script>

  <!-- POPUNDER AD CODE - keep this at bottom -->
  <script src="https://pl29526455.effectivecpmnetwork.com/58/05/56/58055653b97b5e7459c379b365eb1d4d.js"></script>

</body>
</html>
