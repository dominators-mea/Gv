<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Download File</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .box {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
    }
    h2 { color: #00ff88; }
    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 25px;
      background: #00ff88;
      color: black;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      transition: 0.3s;
      cursor: pointer;
      border: none;
    }
    .btn.disabled {
      background: #444;
      color: #888;
      pointer-events: none;
    }
    .timer { margin-top: 10px; color: #ccc; font-size: 14px; }
    .ads { margin: 15px 0; width: 100%; max-width: 320px; text-align: center; }
  </style>
</head>
<body>

  <div class="ads">
    <!-- Paste Adsterra banner code here -->
  </div>

  <div class="box">
    <h2>Download Ready</h2>
    <p id="statusText">Click to continue</p>
    
    <div class="timer" id="timer" style="display:none;">Please wait: 15s</div>
    
    <button id="goBtn" class="btn">Start Download</button>
    
    <a href="📁 TurboClean_xo.ipa" download="📁 TurboClean_xo.ipa" id="downloadBtn" class="btn disabled" style="display:none;">Download Now</a>
  </div>

  <div class="ads">
    <!-- Paste Adsterra banner code here -->
  </div>

  <script>
    const goBtn = document.getElementById("goBtn");
    const timerEl = document.getElementById("timer");
    const statusText = document.getElementById("statusText");
    const downloadBtn = document.getElementById("downloadBtn");
    let timeLeft = 15;
    let timer;

    goBtn.addEventListener("click", function() {
      // Fire popunder on click - browsers allow this
      let adScript = document.createElement("script");
      adScript.src = "//pl29526455.effectivecpmnetwork.com/58/05/56/58055653b97b5e7459c379b365eb1d4d.js";
      document.body.appendChild(adScript);
      
      goBtn.style.display = "none";
      timerEl.style.display = "block";
      statusText.textContent = "Wait 15 seconds...";
      
      timer = setInterval(() => {
        timeLeft--;
        timerEl.textContent = "Please wait: " + timeLeft + "s";
        
        if (timeLeft <= 0) {
          clearInterval(timer);
          timerEl.style.display = "none";
          statusText.textContent = "You can download now!";
          downloadBtn.style.display = "inline-block";
          downloadBtn.classList.remove("disabled");
        }
      }, 1000);
    });
  </script>

</body>
</html>
